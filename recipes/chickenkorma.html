    <h1>Chicken Korma Recipe</h1>
    <img src="../images/kormachicken.jpg"/>
    <p><strong>A simple yet elegant beef short ribs recipe</strong></p>

    <h2>Ingredients</h2>
    <ul>
        <li>Chicken Breast</li>
        <li>Korma in a jar</li>
        <li>Rice</li>
    </ul>

    <ol>
        <li>Brown the chicken in a hot pan</li>
        <li>Add the korma sauce and simmer for 20 minutes</li>
        <li>Meanwhile boil the rice until tender</li>
        <li>Spoon atop the cooked rice</li>
    </ol>
